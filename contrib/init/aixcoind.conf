description "Aixcoin Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env AIXCOIND_BIN="/usr/bin/aixcoind"
env AIXCOIND_USER="aixcoin"
env AIXCOIND_GROUP="aixcoin"
env AIXCOIND_PIDDIR="/var/run/aixcoind"
# upstart can't handle variables constructed with other variables
env AIXCOIND_PIDFILE="/var/run/aixcoind/aixcoind.pid"
env AIXCOIND_CONFIGFILE="/etc/aixcoin/aixcoin.conf"
env AIXCOIND_DATADIR="/var/lib/aixcoind"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # aixcoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$AIXCOIND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run aixcoind."
        echo "The setting must appear in $AIXCOIND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Aixcoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$AIXCOIND_PIDDIR"
    chmod 0755 "$AIXCOIND_PIDDIR"
    chown $AIXCOIND_USER:$AIXCOIND_GROUP "$AIXCOIND_PIDDIR"
    chown $AIXCOIND_USER:$AIXCOIND_GROUP "$AIXCOIND_CONFIGFILE"
    chmod 0660 "$AIXCOIND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$AIXCOIND_PIDFILE" \
    --chuid $AIXCOIND_USER:$AIXCOIND_GROUP \
    --exec "$AIXCOIND_BIN" \
    -- \
    -pid="$AIXCOIND_PIDFILE" \
    -conf="$AIXCOIND_CONFIGFILE" \
    -datadir="$AIXCOIND_DATADIR" \
    -disablewallet \
    -daemon

